<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa UAM Azcapotzalco con Imágenes</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #FF0000;
      min-height:100vh; padding:20px;
    }
    .container {
      max-width:1400px; margin:0 auto; display:grid; grid-template-columns:280px 1fr;
      gap:20px; height:calc(100vh - 40px);
    }
    .sidebar {
      background:white; border-radius:16px; padding:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
      display:flex; flex-direction:column; gap:20px; overflow:hidden;
    }
    .header { text-align:center; padding-bottom:15px; border-bottom:2px solid #f0f0f0; }
    .header h1 { color:#1e40af; font-size:1.5rem; font-weight:700; margin-bottom:5px; }
    .header p { color:#4b5563; font-size:.9rem; }

    /* ===== Panel con secciones ===== */
    .icon-groups {
      display:flex; flex-direction:column; gap:14px;
      padding:10px 0; max-height:350px; overflow-y:auto;
    }
    .icon-group {
      background:#f8fafc; border:2px solid #e2e8f0; border-radius:12px; padding:10px;
    }
    .icon-group-title {
      font-size:.95rem; font-weight:700; color:#1e3a8a;
      margin-bottom:8px; display:flex; align-items:center; gap:8px;
    }
    .icon-group-title .dot {
      width:8px; height:8px; border-radius:9999px; background:#3b82f6;
    }
    .icon-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; }

    /* Botones de icono (reutilizamos estilos) */
    .icon-item {
      background:#fff; border:2px solid #e2e8f0; border-radius:12px;
      cursor:pointer; padding:8px; transition:.2s ease; user-select:none;
      display:flex; align-items:center; justify-content:center;
    }
    .icon-item:hover { transform:translateY(-2px); border-color:#3b82f6; box-shadow:0 4px 12px rgba(59,130,246,.2); }
    .icon-item.selected { background:#3b82f6; border-color:#3b82f6; }
    .icon-thumb { width:34px; height:34px; object-fit:contain; display:block; filter: drop-shadow(0 1px 1px rgba(0,0,0,.15)); }

    .instructions { background:#eff6ff; border-radius:12px; padding:15px; font-size:.9rem; color:#1e3a8a; }
    .instructions h3 { margin-bottom:8px; color:#1e3a8a; }
    .instructions ul { padding-left:20px; margin-top:8px; }
    .instructions li { margin-bottom:5px; }

    #map-container { border-radius:16px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.2); background:white; }
    #map { height:100%; width:100%; }

    .status-bar { background:white; padding:10px 20px; border-radius:12px;
      display:flex; justify-content:space-between; align-items:center; margin-top:auto; }
    .status-bar span { font-weight:600; color:#1e40af; }
    .pin-count { background:#3b82f6; color:white; padding:4px 12px; border-radius:20px; font-size:.9rem; }

    /* Scrollbar estética */
    .icon-groups::-webkit-scrollbar { width:6px; }
    .icon-groups::-webkit-scrollbar-track { background:#f1f1f1; border-radius:3px; }
    .icon-groups::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
    .icon-groups::-webkit-scrollbar-thumb:hover { background:#94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="header">
        <h1>UAM Azcapotzalco</h1>
        <p>Selecciona un ícono y haz clic en el mapa</p>
      </div>

      <!-- Panel con secciones -->
      <div id="iconGroups" class="icon-groups"></div>

      <div class="instructions">
        <h3>📋 Instrucciones</h3>
        <ul>
          <li>Selecciona un ícono de alguna sección</li>
          <li>Haz clic en cualquier lugar del mapa</li>
          <li>El ícono aparecerá como un pin</li>
          <li>Puedes colocar múltiples pins</li>
        </ul>
      </div>

      <div class="status-bar">
        <span>Pins colocados:</span>
        <span class="pin-count" id="pinCount">0</span>
      </div>
    </div>

    <div id="map-container">
      <div id="map"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Base de estáticos (Flask)
    const STATIC_IMG = "{{ url_for('static', filename='img/') }}"; // termina con '/'

    // ==== Íconos por sección (ajusta nombres de archivo a los tuyos en static/img/) ====
    const ICONS_VIOLENCIA = [
      { name: 'VIP', src: STATIC_IMG + 'Sticker Violencia - 01.png' },
      { name: 'AEP', src: STATIC_IMG + 'Sticker Violencia - 02.png' },
      { name: 'VIO', src: STATIC_IMG + 'Sticker Violencia - 03.png' },
      { name: 'VFI', src: STATIC_IMG + 'Sticker Violencia - 04.png' },
      { name: 'FEM', src: STATIC_IMG + 'Sticker Violencia - 05.png' },
      { name: 'VIN', src: STATIC_IMG + 'Sticker Violencia - 06.png' },
      { name: 'VPA', src: STATIC_IMG + 'Sticker Violencia - 07.png' },
      { name: 'VCO', src: STATIC_IMG + 'Sticker Violencia - 08.png' },
    ];
    const ICONS_MEJORAMIENTO = [
      { name: 'alumbrado', src: STATIC_IMG + 'Stickers entorno urbano-01.png' },
      { name: 'bacheo',    src: STATIC_IMG + 'Stickers entorno urbano-02.png' },
      { name: 'banqueta',  src: STATIC_IMG + 'Stickers entorno urbano-03.png' },
      { name: 'arbolado',  src: STATIC_IMG + 'Stickers entorno urbano-04.png' },
      { name: 'limpieza',  src: STATIC_IMG + 'Stickers entorno urbano-05.png' },
      { name: 'limpieza',  src: STATIC_IMG + 'Stickers entorno urbano-06.png' },
      { name: 'limpieza',  src: STATIC_IMG + 'Stickers entorno urbano-07.png' },
      { name: 'limpieza',  src: STATIC_IMG + 'Stickers entorno urbano-08.png' },
      { name: 'limpieza',  src: STATIC_IMG + 'Stickers entorno urbano-09.png' },
    ];

    // Precarga opcional
    [...ICONS_VIOLENCIA, ...ICONS_MEJORAMIENTO].forEach(i => { const _im = new Image(); _im.src = i.src; });

    // Render del panel con secciones
    const groupsContainer = document.getElementById('iconGroups');
    const pinCountElement = document.getElementById('pinCount');
    let selectedIconUrl = null;
    let selectedPinCode = null; // <-- código que mandaremos a la BD
    let pinCount = 0;

    function renderGroup(title, colorDot, icons) {
      const group = document.createElement('div');
      group.className = 'icon-group';

      const header = document.createElement('div');
      header.className = 'icon-group-title';
      header.innerHTML = `<span class="dot" style="background:${colorDot}"></span>${title}`;
      group.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'icon-grid';

      icons.forEach((icon, idx) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'icon-item';
        btn.innerHTML = `<img class="icon-thumb" src="${icon.src}" alt="${icon.name}">`;
        btn.title = icon.name;

        btn.addEventListener('click', () => {
          document.querySelectorAll('.icon-item').forEach(el => el.classList.remove('selected'));
          btn.classList.add('selected');
          selectedIconUrl = icon.src;
          selectedPinCode = icon.name; // <-- aquí guardamos el código del pin
        });

        // Seleccionar el primero si no hay selección aún
        if (!selectedIconUrl && idx === 0) {
          btn.classList.add('selected');
          selectedIconUrl = icon.src;
          selectedPinCode = icon.name;
        }

        grid.appendChild(btn);
      });

      group.appendChild(grid);
      groupsContainer.appendChild(group);
    }

    // Pinta ambas secciones
    renderGroup('Violencia', '#ef4444', ICONS_VIOLENCIA);             // rojo
    renderGroup('Mejoramiento Urbano', '#10b981', ICONS_MEJORAMIENTO); // verde

    // ====== Mapa ======
    const UAM_AZCAPOTZALCO = [19.5083, -99.1856];
    const map = L.map('map').setView(UAM_AZCAPOTZALCO, 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Marker UAM
    const uamIcon = L.icon({
      iconUrl: STATIC_IMG + "Uam_azc.webp",
      iconSize: [40, 40],
      iconAnchor: [20, 40],
      popupAnchor: [0, -36]
    });
    L.marker(UAM_AZCAPOTZALCO, { icon: uamIcon })
      .addTo(map)
      .bindPopup('<b>UAM Azcapotzalco</b><br>Universidad Autónoma Metropolitana');

    // Colocar pines
    map.on('click', function(e) {
      if (!selectedIconUrl) return;

      const imgIcon = L.icon({
        iconUrl: selectedIconUrl,
        iconSize: [36, 36],
        iconAnchor: [18, 36],
        popupAnchor: [0, -32]
      });

      const marker = L.marker(e.latlng, { icon: imgIcon }).addTo(map);
      pinCount++;
      pinCountElement.textContent = pinCount;

      marker.bindPopup(`
        <div style="text-align:center; margin-bottom:6px;">
          <img src="${selectedIconUrl}" alt="pin" style="width:28px; height:28px; object-fit:contain;">
        </div>
        <div style="font-size:12px;">
          Lat: ${e.latlng.lat.toFixed(6)}<br>
          Lng: ${e.latlng.lng.toFixed(6)}<br>
          Código: ${selectedPinCode || 'N/A'}
        </div>
      `);

      // ===== Enviar pin al backend =====
      fetch("/api/pins", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          lat: e.latlng.lat,
          lon: e.latlng.lng,
          codigo_pin: selectedPinCode,  // se guarda en la BD
          nom: selectedIconUrl          // opcional, guardamos la URL del icono
        })
      })
      .then(res => res.json())
      .then(data => {
        console.log("Respuesta /api/pins:", data);
        if (!data.ok) {
          alert("No se pudo guardar el pin en la base de datos.");
        }
      })
      .catch(err => {
        console.error("Error llamando /api/pins:", err);
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa UAM Azcapotzalco con Imágenes</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      /* ==========================
       RESET / BASE
       ========================== */
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }

    /* ==========================
       LAYOUT FULLSCREEN (SIN CABECERA)
       ========================== */
    .map-wrapper {
      background: #ff0000;
      height: 100vh;
      padding: 16px;
    }

    .container {
      height: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(240px, 25%) 1fr;
      gap: 16px;
    }

    /* ==========================
       SIDEBAR
       ========================== */
    .sidebar {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      display: flex;
      flex-direction: column;
      gap: 16px;
      height: 100%;
      overflow: hidden;
      min-width: 0;
    }

    .header {
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f0f0;
    }
    .header h1 {
      color: #1e40af;
      font-size: 1.4rem;
      font-weight: 800;
      margin: 0 0 6px 0;
    }
    .header p {
      color: #4b5563;
      font-size: .95rem;
      margin: 0;
    }

    .icon-groups {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 6px 0;
      overflow-y: auto;
      max-height: clamp(260px, 45vh, 520px);
    }

    .icon-group {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px;
    }
    .icon-group-title {
      font-size: .95rem;
      font-weight: 800;
      color: #1e3a8a;
      margin: 0 0 10px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .icon-group-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: #3b82f6;
      display: inline-block;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .icon-item {
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      cursor: pointer;
      padding: 8px;
      transition: .2s ease;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    .icon-item:hover {
      transform: translateY(-2px);
      border-color: #3b82f6;
      box-shadow: 0 4px 12px rgba(59,130,246,.2);
    }
    .icon-item.selected {
      background: #3b82f6;
      border-color: #3b82f6;
    }

    .icon-thumb {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.15));
    }

    .instructions {
      background: #eff6ff;
      border-radius: 12px;
      padding: 14px;
      font-size: .95rem;
      color: #1e3a8a;
    }
    .instructions h3 {
      margin: 0 0 8px 0;
      color: #1e3a8a;
      font-weight: 800;
    }
    .instructions ul { padding-left: 18px; margin: 8px 0 0 0; }
    .instructions li { margin-bottom: 6px; }

    .status-bar {
      background: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: auto;
      border: 2px solid #f1f5f9;
    }
    .status-bar span { font-weight: 700; color: #1e40af; }
    .pin-count {
      background: #3b82f6;
      color: #fff;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: .9rem;
      font-weight: 800;
      white-space: nowrap;
    }

    /* Scrollbar suave */
    .icon-groups::-webkit-scrollbar { width: 6px; }
    .icon-groups::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
    .icon-groups::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .icon-groups::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* ==========================
       MAPA
       ========================== */
    #map-container {
      height: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.2);
      background: #fff;
      min-width: 0;
      min-height: 520px;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Evitar que Leaflet “se coma” overlays */
    .leaflet-container { z-index: 1; }

    /* ==========================
       RESPONSIVE
       ========================== */
    @media (max-width: 1024px) {
      .container {
        grid-template-columns: minmax(220px, 32%) 1fr;
      }
      #map-container { min-height: 480px; }
    }

    @media (max-width: 768px) {
      .map-wrapper { padding: 10px; }
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: 55vh auto;
      }
      #map-container { min-height: 55vh; }
      .icon-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 420px) {
      .icon-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    </style>
  </head>

  <body class="header">
    <!-- ================= ZONA DEL MAPA ================= -->
    <div class="map-wrapper">
      <div class="container">
        <div class="sidebar">
          <div class="header">
            <h1>UAM Azcapotzalco</h1>
            <p>Selecciona un ícono y haz clic en el mapa</p>
          </div>

          <div id="iconGroups" class="icon-groups"></div>

          <div class="instructions">
            <h3>📋 Instrucciones</h3>
            <ul>
              <li>Selecciona un ícono de alguna sección</li>
              <li>Haz clic en cualquier lugar del mapa</li>
              <li>El ícono aparecerá como un pin</li>
              <li>Puedes colocar múltiples pins</li>
            </ul>
          </div>

          <div class="status-bar">
            <span>Pins colocados:</span>
            <span class="pin-count" id="pinCount">0</span>
          </div>
        </div>

        <div id="map-container">
          <div id="map"></div>
        </div>
      </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      const STATIC_IMG = "{{ url_for('static', filename='img/') }}";

      const ICONS_VIOLENCIA = [
        { name: "VIP", src: STATIC_IMG + "Sticker Violencia - 01.png" },
        { name: "AEP", src: STATIC_IMG + "Sticker Violencia - 02.png" },
        { name: "VIO", src: STATIC_IMG + "Sticker Violencia - 03.png" },
        { name: "VFI", src: STATIC_IMG + "Sticker Violencia - 04.png" },
        { name: "FEM", src: STATIC_IMG + "Sticker Violencia - 05.png" },
        { name: "VIN", src: STATIC_IMG + "Sticker Violencia - 06.png" },
        { name: "VPA", src: STATIC_IMG + "Sticker Violencia - 07.png" },
        { name: "VCO", src: STATIC_IMG + "Sticker Violencia - 08.png" },
      ];
      const ICONS_MEJORAMIENTO = [
        {
          name: "alumbrado",
          src: STATIC_IMG + "Stickers entorno urbano-01.png",
        },
        { name: "bacheo", src: STATIC_IMG + "Stickers entorno urbano-02.png" },
        {
          name: "banqueta",
          src: STATIC_IMG + "Stickers entorno urbano-03.png",
        },
        {
          name: "arbolado",
          src: STATIC_IMG + "Stickers entorno urbano-04.png",
        },
        {
          name: "limpieza",
          src: STATIC_IMG + "Stickers entorno urbano-05.png",
        },
        {
          name: "limpieza",
          src: STATIC_IMG + "Stickers entorno urbano-06.png",
        },
        {
          name: "limpieza",
          src: STATIC_IMG + "Stickers entorno urbano-07.png",
        },
        {
          name: "limpieza",
          src: STATIC_IMG + "Stickers entorno urbano-08.png",
        },
        {
          name: "limpieza",
          src: STATIC_IMG + "Stickers entorno urbano-09.png",
        },
      ];

      [...ICONS_VIOLENCIA, ...ICONS_MEJORAMIENTO].forEach((i) => {
        const _im = new Image();
        _im.src = i.src;
      });

      const groupsContainer = document.getElementById("iconGroups");
      const pinCountElement = document.getElementById("pinCount");
      let selectedIconUrl = null;
      let selectedPinCode = null;
      let pinCount = 0;

      function renderGroup(title, colorDot, icons) {
        const group = document.createElement("div");
        group.className = "icon-group";

        const header = document.createElement("div");
        header.className = "icon-group-title";
        header.innerHTML = `<span class="dot" style="background:${colorDot}"></span>${title}`;
        group.appendChild(header);

        const grid = document.createElement("div");
        grid.className = "icon-grid";

        icons.forEach((icon, idx) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "icon-item";
          btn.innerHTML = `<img class="icon-thumb" src="${icon.src}" alt="${icon.name}">`;
          btn.title = icon.name;

          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".icon-item")
              .forEach((el) => el.classList.remove("selected"));
            btn.classList.add("selected");
            selectedIconUrl = icon.src;
            selectedPinCode = icon.name;
          });

          if (!selectedIconUrl && idx === 0) {
            btn.classList.add("selected");
            selectedIconUrl = icon.src;
            selectedPinCode = icon.name;
          }

          grid.appendChild(btn);
        });

        group.appendChild(grid);
        groupsContainer.appendChild(group);
      }

      renderGroup("Violencia", "#ef4444", ICONS_VIOLENCIA);
      renderGroup("Mejoramiento Urbano", "#10b981", ICONS_MEJORAMIENTO);

      const UAM_AZCAPOTZALCO = [19.5083, -99.1856];
      const map = L.map("map").setView(UAM_AZCAPOTZALCO, 16);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      }).addTo(map);

      const uamIcon = L.icon({
        iconUrl: STATIC_IMG + "Uam_azc.webp",
        iconSize: [40, 40],
        iconAnchor: [20, 40],
        popupAnchor: [0, -36],
      });
      L.marker(UAM_AZCAPOTZALCO, { icon: uamIcon })
        .addTo(map)
        .bindPopup(
          "<b>UAM Azcapotzalco</b><br>Universidad Autónoma Metropolitana"
        );

      map.on("click", function (e) {
        if (!selectedIconUrl) return;

        const imgIcon = L.icon({
          iconUrl: selectedIconUrl,
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          popupAnchor: [0, -32],
        });

        const marker = L.marker(e.latlng, { icon: imgIcon }).addTo(map);
        pinCount++;
        pinCountElement.textContent = pinCount;

        marker.bindPopup(`
        <div style="text-align:center; margin-bottom:6px;">
          <img src="${selectedIconUrl}" alt="pin" style="width:28px; height:28px; object-fit:contain;">
        </div>
        <div style="font-size:12px;">
          Lat: ${e.latlng.lat.toFixed(6)}<br>
          Lng: ${e.latlng.lng.toFixed(6)}<br>
          Código: ${selectedPinCode || "N/A"}
        </div>
      `);

        fetch("/api/pins", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            lat: e.latlng.lat,
            lon: e.latlng.lng,
            codigo_pin: selectedPinCode,
            nom: selectedIconUrl,
          }),
        }).catch((err) => console.error("Error llamando /api/pins:", err));
      });
    </script>

    <!-- JS del menú (sin cambios) -->
    <script src="static/img/JS/menu.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", setupMenu);
    </script>
    <script>
      (function () {
        // Si es navegación interna, ponemos esta bandera en true
        let isInternalNavigation = false;

        function isSameOrigin(href) {
          try {
            const url = new URL(href, window.location.href);
            return url.origin === window.location.origin;
          } catch (e) {
            return false;
          }
        }

        // Interceptar clicks en enlaces
        document.addEventListener(
          "click",
          function (e) {
            const a = e.target.closest("a[href]");
            if (!a) return;

            const href = a.getAttribute("href");
            if (!href) return;

            // Enlaces solo con # (anclas internas)
            if (href.startsWith("#")) {
              isInternalNavigation = true; // no cerrar sesión
              return;
            }

            if (isSameOrigin(href)) {
              // Navegación dentro del MISMO dominio → no cerramos sesión
              isInternalNavigation = true;
            } else {
              // Navegación a OTRO dominio → cerramos sesión ya
              isInternalNavigation = false;
              navigator.sendBeacon("/logout");
            }
          },
          true
        );

        // Interceptar formularios (por si mandan a otro dominio)
        document.addEventListener(
          "submit",
          function (e) {
            const form = e.target;
            const action = form.getAttribute("action") || window.location.href;

            if (isSameOrigin(action)) {
              isInternalNavigation = true; // formulario dentro del mismo dominio
            } else {
              isInternalNavigation = false;
              navigator.sendBeacon("/logout");
            }
          },
          true
        );

        // Cuando la página se va a descargar (cerrar pestaña, recargar, irse a otro sitio)
        window.addEventListener("beforeunload", function () {
          // Si NO es navegación interna dentro del mismo dominio → cerrar sesión
          if (!isInternalNavigation) {
            navigator.sendBeacon("/logout");
          }
          // Para la próxima carga, que vuelva a iniciar en false
          isInternalNavigation = false;
        });
      })();
    </script>
  </body>
</html>

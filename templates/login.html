<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>Iniciar Sesión - Mapa Cartográfico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0;
      background: #f3e2da;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1f2937;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      margin: 20px;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      max-width: 180px;
      height: auto;
    }

    h2 {
      margin: 0 0 24px 0;
      font-size: 1.5rem;
      font-weight: 800;
      color: #111827;
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
      color: #374151;
      margin-bottom: 6px;
      display: block;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: #1e3a8a;
      box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
    }

    button {
      margin-top: 10px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #1e3a8a;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover {
      background: #1e40af;
    }

    button:active {
      transform: translateY(1px);
    }

    .links {
      display: flex;
      justify-content: space-between;
      margin-top: 24px;
      font-size: 0.9rem;
    }

    a {
      text-decoration: none;
      color: #6b7280;
      font-weight: 500;
      transition: color 0.2s;
    }

    a:hover {
      color: #1e3a8a;
    }

    .msg {
      background-color: #fee2e2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 500;
      font-size: 0.9rem;
      display: none;
      /* Hidden by default until JS populates it if needed */
    }

    .msg:not(:empty) {
      display: block;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-container">
      <img src="{{ url_for('static', filename='img/Logotipo LEU Negro.webp') }}" alt="Logo LEU" class="logo">
    </div>

    <h2>Registro de datos</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="msg">
      {% for category, message in messages %}
      <div>{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('login')}}">
      <div>
        <label>Edad</label>
        <input type="number" name="edad" required placeholder="Ej. 22" min="1" max="120" />
      </div>

      <div>
        <label>¿De dónde venías?</label>
        <input type="text" name="origen" placeholder="Ej. De casa" required />
      </div>

      <div>
        <label>¿Hacia dónde ibas?</label>
        <input type="text" name="destino" placeholder="Ej. Hacia la escuela" required />
      </div>

      <button type="submit">Entrar</button>
    </form>

    <div class="links">
      <a href="http://192.168.1.105:8080/index.html">← Regresar</a>
      <a href="{{ url_for('admin_login') }}">Soy Administrador</a>
    </div>
  </div>
</body>

</html>

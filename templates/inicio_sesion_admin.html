<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Administración - Iniciar Sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 0;
            background: #f3e2da;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1f2937;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin: 20px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            max-width: 180px;
            height: auto;
        }

        h2 {
            margin: 0 0 24px 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e3a8a;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }

        button {
            margin-top: 10px;
            padding: 14px;
            width: 100%;
            border: none;
            border-radius: 12px;
            background: #1e3a8a;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #1e40af;
        }

        button:active {
            transform: translateY(1px);
        }

        .links {
            text-align: center;
            margin-top: 24px;
        }

        a {
            text-decoration: none;
            color: #6b7280;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        a:hover {
            color: #1e3a8a;
        }

        .msg {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .msg.ok,
        .msg.success {
            background-color: #d1fae5;
            border-color: #6ee7b7;
            color: #065f46;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='img/Logotipo LEU Negro.webp') }}" alt="Logo LEU" class="logo">
        </div>

        <h2>Administrador</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="msgs-container">
            {% for category, message in messages %}
            <div class="msg {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('admin_login') }}">
            <div>
                <label>Usuario</label>
                <input type="text" name="username" required autofocus />
            </div>

            <div>
                <label>Contraseña</label>
                <input type="password" name="password" required />
            </div>

            <button type="submit">Entrar</button>
        </form>

        <div class="links">
            <a href="{{ url_for('login') }}">← Volver al inicio</a>
        </div>
    </div>
</body>

</html>

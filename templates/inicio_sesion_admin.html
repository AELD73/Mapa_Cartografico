<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <title>Administración - Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, Arial;
            margin: 0;
            background: #f3e2da;
        }

        .card {
            max-width: 360px;
            margin: 12vh auto;
            background: #fff;
            padding: 24px 28px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin: 0 0 12px 0;
            color: #1e3a8a;
        }

        label {
            display: block;
            margin-top: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 4px;
        }

        button {
            margin-top: 14px;
            padding: 10px;
            width: 100%;
            border: 0;
            border-radius: 8px;
            background: #1e3a8a;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1e40af;
        }

        .msg {
            color: #b00;
            font-size: 13px;
            margin-top: 6px;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #1f5fd0;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Administrador</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="msg">
            {% for category, message in messages %}
            <div>{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('admin_login') }}">
            <label>Usuario</label>
            <input type="text" name="username" required autofocus />

            <label>Contraseña</label>
            <input type="password" name="password" required />

            <button type="submit">Entrar</button>
        </form>

        <a href="{{ url_for('login') }}">← Volver al inicio</a>
    </div>
</body>

</html>

<!doctype html>
<html lang="es">

<head>
  <link rel="icon" type="image/webp" href="{{ url_for('static', filename='img/Logotipo LEU Negro.webp') }}" />

  <meta charset="utf-8" />
  <title>Registrar administrador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_style.css') }}">
</head>

<body>
  <!-- Inline style for specific centering behavior not in generic admin styling -->
  <div class="card" style="max-width: 420px; margin: 10vh auto;">
    <h2>Registrar administrador</h2>
    <p>Si ya existe un administrador, solo un admin logueado puede crear más.</p>

    {% with msgs = get_flashed_messages(with_categories=true) %}
    {% if msgs %}
    <div class="msgs">
      {% for cat, m in msgs %}
      <div>{{ m }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="post">
      <label>Usuario</label>
      <input type="text" name="username" required>
      <label>Contraseña</label>
      <input type="password" name="password" required>
      <button type="submit">Crear administrador</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center;">
      <a href="{{ url_for('login') }}" class="btn btn-outline">Ir a iniciar sesión</a>
      <a href="{{ url_for('index') }}" class="btn btn-outline" style="margin-left: 8px;">Volver al mapa</a>
    </div>
  </div>
</body>

</html>
